<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Clinic Expense Management</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      padding: 20px;
    }
    .card {
      background: #fff;
      padding: 20px;
      max-width: 400px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,.1);
    }
    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    button {
      background: #1e3a5f;
      color: #fff;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .hidden { display: none; }
    .alert {
      margin-top: 10px;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }
    .alert.error { background: #fdecea; color: #b02a37; }
    .alert.success { background: #e6f4ea; color: #1e7e34; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen" class="card">
  <h2>Clinic Expense Management</h2>

  <div id="loginAlert" class="alert error"></div>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button id="loginBtn">Login</button>
</div>

<!-- MAIN APP -->
<div id="mainScreen" class="card hidden">
  <h2>Welcome</h2>
  <p id="userDisplay"></p>
  <button id="logoutBtn">Logout</button>
</div>

<script>
/* ================= USERS ================= */
const USERS = {
  cashier: { password: 'clinic123', role: 'Cashier' },
  admin: { password: 'admin123', role: 'Admin' }
};

let currentUser = null;

/* ================= HELPERS ================= */
function showAlert(id, message) {
  const el = document.getElementById(id);
  el.textContent = message;
  el.style.display = 'block';
}

function clearAlert(id) {
  const el = document.getElementById(id);
  el.style.display = 'none';
}

/* ================= LOGIN ================= */
async function login() {
  const u = document.getElementById('username').value.trim();
  const p = document.getElementById('password').value;

  if (!u || !p) {
    showAlert('loginAlert', 'Enter username and password');
    return;
  }

  const user = USERS[u];

  if (user && user.password === p) {
    currentUser = { username: u, role: user.role };

    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('mainScreen').classList.remove('hidden');
    document.getElementById('userDisplay').textContent =
      `Logged in as ${u} (${user.role})`;

    clearAlert('loginAlert');
  } else {
    showAlert('loginAlert', 'Invalid username or password');
  }
}

function logout() {
  location.reload();
}

/* ================= EVENTS ================= */
document.getElementById('loginBtn').addEventListener('click', login);
document.getElementById('logoutBtn').addEventListener('click', logout);

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>

</body>
</html>
