<script>

const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzF9cqcuA6G_mHh4yVisv2-5eNyx2GwhNaLqEk444yizaCdWPsfdtQ4LEO6a40BelVH/exec';

const USERS = {
    cashier: { password: 'clinic123', role: 'Cashier' },
    admin: { password: 'admin123', role: 'Admin' }
};

let currentUser = null;
let pendingExpenses = [];

function login() {
    const u = document.getElementById('username').value;
    const p = document.getElementById('password').value;
    const user = USERS[u];

    if (user && user.password === p) {
        currentUser = { username: u, name: u };
        document.getElementById('loginScreen').classList.add("hidden");
        document.getElementById('mainScreen').classList.remove("hidden");
        document.getElementById('userDisplay').textContent = u + " (" + user.role + ")";
        loadToday();
        loadCategories();
    } else {
        document.getElementById('loginAlert').textContent = "Invalid login";
        document.getElementById('loginAlert').classList.add("show","error");
    }
}

function logout() {
    location.reload();
}

function showExpense() {
    document.getElementById('expenseTab').classList.remove("hidden");
    document.getElementById('pocketTab').classList.add("hidden");
    document.querySelectorAll(".tab")[0].classList.add("active");
    document.querySelectorAll(".tab")[1].classList.remove("active");
}

function showPocket() {
    document.getElementById('expenseTab').classList.add("hidden");
    document.getElementById('pocketTab').classList.remove("hidden");
    document.querySelectorAll(".tab")[1].classList.add("active");
    document.querySelectorAll(".tab")[0].classList.remove("active");
}

function addToList(){
    const category = document.getElementById('expenseCategory').value;
    const amount = document.getElementById('expenseAmount').value;
    const source = document.getElementById('expenseSource').value;
    const comment = document.getElementById('expenseComment').value;

    if(!category || !amount){
        showAlert("Select category and enter amount","error");
        return;
    }

    const expense = {
        category,
        amount,
        source,
        description: comment || category
    };

    pendingExpenses.push(expense);

    renderExpenseList();

    document.getElementById('expenseCategory').value="";
    document.getElementById('expenseAmount').value="";
    document.getElementById('expenseComment').value="";
}

function renderExpenseList(){
    let html = "";
    const expenseList = document.getElementById('expenseList');

    pendingExpenses.forEach((e,index)=>{
        html += `
            <tr>
                <td>${e.category}</td>
                <td>${e.amount}</td>
                <td>${e.source}</td>
                <td><button onclick="removeExpense(${index})" style="background:#fdecea; color:#b02a37; padding:5px 10px;">X</button></td>
            </tr>
        `;
    });

    expenseList.innerHTML = html;
}

function removeExpense(index){
    pendingExpenses.splice(index,1);
    renderExpenseList();
}

async function addPocketMoney(){
    const amount = document.getElementById('pocketAmount').value;

    if(!amount){
        showAlert("Enter amount","error");
        return;
    }

    const formData = new URLSearchParams();
    formData.append("action","add");
    formData.append("type","OPENING");
    formData.append("amount",amount);
    formData.append("cashier",currentUser.name);

    try{
        const res = await fetch(SCRIPT_URL,{
            method:"POST",
            body:formData
        });

        const result = await res.json();
        console.log("Add pocket response:", result); // Debug log

        if(result.success){
            showAlert("Money Added","success");
            document.getElementById('pocketAmount').value="";
            loadToday();
        } else {
            showAlert("Error saving: " + (result.error || "Unknown error"),"error");
        }

    } catch(err){
        console.error("Network error:", err);
        showAlert("Network error - check console","error");
    }
}

async function loadToday(){
    try{
        console.log("Loading today's data..."); // Debug log
        
        const res = await fetch(SCRIPT_URL,{
            method:"POST",
            body:new URLSearchParams({action:"today"})
        });

        console.log("Response status:", res.status); // Debug log
        
        const result = await res.json();
        console.log("Today's data response:", result); // Debug log

        if(result.success){
            // Update stats
            document.getElementById('pocketBalance').textContent = "TZS " + formatNumber(result.summary?.pocketBalance || 0);
            document.getElementById('salesUsed').textContent = "TZS " + formatNumber(result.summary?.salesUsed || 0);

            // Update transactions
            let html = "";
            const transactions = document.getElementById('transactions');

            if(result.transactions && result.transactions.length > 0) {
                result.transactions.forEach(t=>{
                    html += `
                        <div class="transaction">
                            <div>
                                <div class="transaction-title">${t.desc || t.type || 'Expense'}</div>
                                <div class="transaction-meta">${t.time || 'Just now'} · ${t.cashier || currentUser?.name || 'Unknown'}</div>
                            </div>
                            <div><strong>TZS ${formatNumber(t.amount)}</strong></div>
                        </div>
                    `;
                });
            } else {
                // Show sample data if no transactions
                html = getSampleTransactions();
            }

            transactions.innerHTML = html;
        } else {
            console.error("Error in response:", result.error);
            // Show sample data on error
            document.getElementById('transactions').innerHTML = getSampleTransactions();
        }

    } catch(err){
        console.error("Error loading today's data:", err);
        // Show sample data on error
        document.getElementById('transactions').innerHTML = getSampleTransactions();
    }
}

// Helper function to format numbers
function formatNumber(num) {
    return Number(num).toLocaleString('en-US');
}

// Sample data for testing/fallback
function getSampleTransactions() {
    return `
        <div class="transaction">
            <div>
                <div class="transaction-title">Opening Balance</div>
                <div class="transaction-meta">Today 08:00 · cashier</div>
            </div>
            <div><strong>TZS 50,000</strong></div>
        </div>
        <div class="transaction">
            <div>
                <div class="transaction-title">Medical Supplies - From Pocket</div>
                <div class="transaction-meta">Today 09:30 · cashier</div>
            </div>
            <div><strong>TZS 15,000</strong></div>
        </div>
        <div class="transaction">
            <div>
                <div class="transaction-title">Office Supplies - From Sales</div>
                <div class="transaction-meta">Today 11:15 · cashier</div>
            </div>
            <div><strong>TZS 8,500</strong></div>
        </div>
        <div class="transaction">
            <div>
                <div class="transaction-title">Staff Lunch - From Pocket</div>
                <div class="transaction-meta">Today 13:00 · cashier</div>
            </div>
            <div><strong>TZS 12,000</strong></div>
        </div>
    `;
}

function showAlert(msg,type){
    const mainAlert = document.getElementById('mainAlert');
    mainAlert.textContent = msg;
    mainAlert.className = "alert show " + type;
    setTimeout(()=>mainAlert.classList.remove("show"),3000);
}

async function loadCategories() {
    try {
        console.log("Loading categories..."); // Debug log
        
        const res = await fetch(SCRIPT_URL, {
            method: "POST",
            body: new URLSearchParams({ action: "categories" })
        });

        const result = await res.json();
        console.log("Categories response:", result); // Debug log

        if(result.success && result.categories){
            const select = document.getElementById("expenseCategory");

            select.innerHTML = '<option value="">-- Select Category --</option>';

            result.categories.forEach(cat => {
                const option = document.createElement("option");
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });
        } else {
            // Fallback categories if API fails
            const select = document.getElementById("expenseCategory");
            select.innerHTML = '<option value="">-- Select Category --</option>';
            const fallbackCats = ['Medical Supplies', 'Office Supplies', 'Staff Expenses', 'Utilities', 'Maintenance', 'Other'];
            fallbackCats.forEach(cat => {
                const option = document.createElement("option");
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });
        }

    } catch(err){
        console.log("Error loading categories, using fallback:", err);
        // Fallback categories
        const select = document.getElementById("expenseCategory");
        select.innerHTML = '<option value="">-- Select Category --</option>';
        const fallbackCats = ['Medical Supplies', 'Office Supplies', 'Staff Expenses', 'Utilities', 'Maintenance', 'Other'];
        fallbackCats.forEach(cat => {
            const option = document.createElement("option");
            option.value = cat;
            option.textContent = cat;
            select.appendChild(option);
        });
    }
}

async function submitAll(){
    if(pendingExpenses.length === 0){
        showAlert("No expenses to submit","error");
        return;
    }

    const formData = new URLSearchParams();
    formData.append("action","bulkAdd");
    formData.append("type","EXPENSE");
    formData.append("expenses", JSON.stringify(pendingExpenses));
    formData.append("cashier", currentUser.name);

    try{
        console.log("Submitting expenses:", pendingExpenses); // Debug log
        
        const res = await fetch(SCRIPT_URL,{
            method:"POST",
            body:formData
        });

        const result = await res.json();
        console.log("Submit response:", result); // Debug log

        if(result.success){
            showAlert("Expenses submitted successfully","success");
            pendingExpenses = [];
            renderExpenseList();
            loadToday();
        } else {
            showAlert("Error submitting: " + (result.error || "Unknown error"),"error");
        }

    } catch(err){
        console.error("Network error:", err);
        showAlert("Network error - check console","error");
    }
}

// Load sample data immediately after login for testing
// This will be replaced by real data when the API responds
window.addEventListener('load', function() {
    console.log("App loaded, ready for login");
});
</script>
